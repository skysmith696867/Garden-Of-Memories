<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>sky’s secret garden</title>

<style>
body{
  margin:0;
  font-family:serif;
  color:#ecfff2;
  background:
    radial-gradient(circle at 20% 10%, rgba(157,255,191,.2), transparent),
    radial-gradient(circle at 80% 40%, rgba(255,209,241,.15), transparent),
    linear-gradient(#07110c,#0b1a12);
  overflow:hidden;
}

/* ✨ MAGIC SHIMMER */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 30% 20%, rgba(157,255,191,.15), transparent),
    radial-gradient(circle at 70% 60%, rgba(255,209,241,.12), transparent);
  animation: shimmer 6s infinite alternate;
}
@keyframes shimmer{
  from{opacity:.6;}
  to{opacity:1;}
}

/* 🌿 TITLE */
h1{
  text-align:center;
  margin-top:20px;
}

/* 🌿 CARD */
.card{
  position:relative;
  margin:30px auto;
  width:90%;
  max-width:500px;
  padding:30px;
  background:rgba(0,0,0,.4);
  border-radius:20px;
  backdrop-filter:blur(6px);
}

/* 🌿 VINE FRAME (IMAGE BUILT-IN) */
.card::before{
  content:"";
  position:absolute;
  inset:0;
  background:url("https://png.pngtree.com/png-clipart/20230920/original/pngtree-vintage-ornamental-floral-frame-with-green-vines-png-image_12560675.png") center/contain no-repeat;
  pointer-events:none;
  opacity:.8;
}

/* INPUTS */
input,select{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,.1);
  color:white;
}

/* BUTTON */
button{
  padding:10px;
  border:none;
  border-radius:10px;
  width:100%;
  background:linear-gradient(90deg,#9dffbf,#ffd1f1);
}

/* 🌸 FLOWERS */
.footer{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
}
.flower{
  width:50px;
  height:50px;
  background:radial-gradient(circle,pink,transparent);
  transform:translateY(30px);
  transition:.3s;
}
.flower:hover{
  transform:translateY(5px) scale(1.1);
}

/* 🧚 FAIRY DECOR (CORNERS) */
.decor{
  position:fixed;
  width:120px;
  opacity:.7;
  pointer-events:none;
}
.tl{top:0;left:0;}
.tr{top:0;right:0;transform:scaleX(-1);}
.bl{bottom:0;left:0;transform:scaleY(-1);}
.br{bottom:0;right:0;transform:scale(-1);}
</style>
</head>

<body>

<h1>sky’s secret garden</h1>
<p style="text-align:center;">find ur destiny if ur brave enough</p>

<!-- 🧚 FAIRIES -->
<img class="decor tl" src="https://media.giphy.com/media/3o7aD2saalBwwftBIY/giphy.gif">
<img class="decor tr" src="https://media.giphy.com/media/3o7aD2saalBwwftBIY/giphy.gif">
<img class="decor bl" src="https://media.giphy.com/media/l0HlQ7LRalQqdWfao/giphy.gif">
<img class="decor br" src="https://media.giphy.com/media/l0HlQ7LRalQqdWfao/giphy.gif">

<div class="card">

<input id="name" placeholder="your name">

<select id="myArch"></select>
<select id="likeArch"></select>

<button onclick="match()">find destiny</button>

</div>

<div class="card" id="result">
waiting for fate...
</div>

<div class="footer">
<div class="flower"></div>
<div class="flower"></div>
<div class="flower"></div>
</div>

<script>

const archetypes = [
"Emotionally unavailable poet",
"Star-crossed detective",
"Runaway royalty",
"Time traveler",
"Dream thief",
"Cursed prodigy",
"Angel"
];

const characters = [
"MJ","Chun Li","Wednesday","Frieren","Catwoman","Black Widow","Zelda"
];

archetypes.forEach(a=>{
  myArch.add(new Option(a,a));
  likeArch.add(new Option(a,a));
});

function match(){
  let c = characters[Math.floor(Math.random()*characters.length)];
  let score = Math.floor(Math.random()*50)+50;

  result.innerHTML = `
    <h2>${c}</h2>
    <p>${score}% compatibility</p>
  `;
}

</script>

</body>
</html>
